<body>
    <div class="sign-in-image vh-100">
        <header>
            <nav class="nav sticky-top">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="flashcards.html">Flashcards</a></li>

            <section class="row p-4 border rounded shadow-sm bg-light">
                <h2 class="text-center">Sign In</h2>
                <form class="align-items-center">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="dubs@uw.edu">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-home">Sign In</button>
                </form>
            </section>
        </main>
    </div>
