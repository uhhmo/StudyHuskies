<!DOCTYPE html>

<body>
    <div class="sign-in-image vh-100">
        <header>
            <nav class="navbar navbar-expand-lg sticky-top" style="background-color: #800080;" aria-label="Main navigation">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link text-white" href="courses.html">Courses</a></li>

                </div>
            </nav>

        <main>
            <section class="row p-4 border rounded shadow-sm bg-light">
                <h2 class="text-center">Sign In</h2>
                <form class="align-items-center">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="dubs@uw.edu">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-home">Sign In</button>
                </form>
            </section>
        </main>
